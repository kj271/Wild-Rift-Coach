kind = "web"
previewPath = "/"
title = "Wild Rift Macro Coach"
version = "1.0.0"
id = "artifacts/wild-rift-coach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21590

[services.development]
run = "pnpm --filter @workspace/wild-rift-coach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wild-rift-coach", "run", "build" ]
publicDir = "artifacts/wild-rift-coach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21590"
BASE_PATH = "/"
